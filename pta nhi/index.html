<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Minecraft-like Game</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Game settings
        const blockSize = 32;
        const worldWidth = 50; // Wider world
        const worldHeight = 20;
        const gravity = 0.2;
        const jumpSpeed = 6;
        const moveSpeed = 3;

        // World generation (simple terrain)
        let world = Array.from({length: worldHeight}, () => Array(worldWidth).fill(0));
        for (let x = 0; x < worldWidth; x++) {
            const height = Math.floor(Math.sin(x / 10) * 3) + worldHeight - 5; // Wavy terrain
            for (let y = height; y < worldHeight; y++) {
                world[y][x] = 1; // 1 = dirt block
            }
            if (Math.random() > 0.8) { // Random grass on top
                world[height - 1][x] = 2; // 2 = grass block
            }
        }

        // Player
        let player = {
            x: blockSize * 5,
            y: blockSize * (worldHeight - 6),
            vx: 0,
            vy: 0,
            width: blockSize * 0.8,
            height: blockSize * 1.8, // Taller like Minecraft player
            onGround: false,
            selectedBlock: 1 // Dirt by default
        };

        // Controls
        const keys = {};
        document.addEventListener('keydown', e => keys[e.key] = true);
        document.addEventListener('keyup', e => keys[e.key] = false);

        // Mouse interaction
        let mouse = { x: 0, y: 0, button: 0 };
        canvas.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        canvas.addEventListener('mousedown', e => {
            mouse.button = e.button + 1; // 1 left, 2 middle, 3 right
            handleClick();
        });
        canvas.addEventListener('mouseup', () => mouse.button = 0);

        function handleClick() {
            const bx = Math.floor(mouse.x / blockSize);
            const by = Math.floor(mouse.y / blockSize);
            if (bx >= 0 && bx < worldWidth && by >= 0 && by < worldHeight) {
                if (mouse.button === 1) { // Left click: place block
                    if (world[by][bx] === 0) {
                        world[by][bx] = player.selectedBlock;
                    }
                } else if (mouse.button === 3) { // Right click: remove block
                    if (world[by][bx] !== 0) {
                        world[by][bx] = 0;
                    }
                }
            }
        }

        // Update physics and input
        function update() {
            // Horizontal movement
            player.vx = 0;
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.vx = -moveSpeed;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) player.vx = moveSpeed;

            // Jump
            if ((keys['ArrowUp'] || keys['w'] || keys['W'] || keys[' ']) && player.onGround) {
                player.vy = -jumpSpeed;
                player.onGround = false;
            }

            // Apply gravity
            player.vy += gravity;
            player.y += player.vy;
            player.x += player.vx;

            // Collision detection (simple floor check)
            player.onGround = false;
            const footY = Math.floor((player.y + player.height) / blockSize);
            const headY = Math.floor(player.y / blockSize);
            const pxLeft = Math.floor(player.x / blockSize);
            const pxRight = Math.floor((player.x + player.width) / blockSize);

            // Ground collision
            if (footY < worldHeight && (world[footY][pxLeft] > 0 || world[footY][pxRight] > 0)) {
                player.y = footY * blockSize - player.height;
                player.vy = 0;
                player.onGround = true;
            }

            // Head collision
            if (headY >= 0 && headY < worldHeight && (world[headY][pxLeft] > 0 || world[headY][pxRight] > 0)) {
                player.y = (headY + 1) * blockSize;
                player.vy = 0;
            }

            // Wall collision left
            if (pxLeft >= 0 && pxLeft < worldWidth && world[Math.floor((player.y + player.height / 2) / blockSize)][pxLeft] > 0) {
                player.x = (pxLeft + 1) * blockSize;
            }

            // Wall collision right
            if (pxRight >= 0 && pxRight < worldWidth && world[Math.floor((player.y + player.height / 2) / blockSize)][pxRight] > 0) {
                player.x = pxRight * blockSize - player.width;
            }

            // Boundaries
            if (player.x < 0) player.x = 0;
            if (player.x > (worldWidth * blockSize - player.width)) player.x = worldWidth * blockSize - player.width;
            if (player.y < 0) player.y = 0;
        }

        // Draw everything
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw world
            for (let y = 0; y < worldHeight; y++) {
                for (let x = 0; x < worldWidth; x++) {
                    if (world[y][x] === 1) { // Dirt
                        ctx.fillStyle = 'brown';
                        ctx.fillRect(x * blockSize, y * blockSize, blockSize, blockSize);
                    } else if (world[y][x] === 2) { // Grass (simple green top)
                        ctx.fillStyle = 'green';
                        ctx.fillRect(x * blockSize, y * blockSize, blockSize, blockSize / 4);
                        ctx.fillStyle = 'brown';
                        ctx.fillRect(x * blockSize, y * blockSize + blockSize / 4, blockSize, blockSize * 3 / 4);
                    }
                }
            }

            // Draw player
            ctx.fillStyle = 'blue';
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Highlight hovered block
            const hx = Math.floor(mouse.x / blockSize);
            const hy = Math.floor(mouse.y / blockSize);
            if (hx >= 0 && hx < worldWidth && hy >= 0 && hy < worldHeight) {
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.strokeRect(hx * blockSize, hy * blockSize, blockSize, blockSize);
            }
        }

        // Game loop
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();

        // Resize handler
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
