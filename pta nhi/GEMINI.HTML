<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Voxel Clone (Canvas 3D)</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: #e5e5f7;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
        }

        #gameContainer {
            background: #16213e;
            border: 4px solid #F44336;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(244, 67, 54, 0.7);
            padding: 20px;
            text-align: center;
            position: relative;
        }

        canvas {
            background-color: #66AABB; /* Sky color */
            border: 2px solid #555;
            border-radius: 8px;
            cursor: none;
            touch-action: none; /* Prevent scrolling on touch */
        }

        .controls-info {
            margin-top: 15px;
            font-size: 1rem;
            line-height: 1.6;
            color: #aaa;
        }

        .controls-info b {
            color: #fff;
            font-weight: 700;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            pointer-events: none;
            z-index: 10;
        }

        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: #ffffff;
            opacity: 0.9;
        }

        #crosshair::before {
            width: 100%;
            height: 2px;
            top: 50%;
            transform: translateY(-50%);
        }

        #crosshair::after {
            width: 2px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <h1>Canvas Voxel Engine</h1>
    <canvas id="canvas3d" width="800" height="600"></canvas>
    <div id="crosshair"></div>

    <div class="controls-info">
        **Movement:** **W A S D** | **Look:** **Click and Drag** (LMB)<br>
        **Interaction:** **LMB** (Destroy Block / Cut Tree) | **RMB** (Place Stone Block)
    </div>
</div>

<script>
    // --- CANVAS SETUP & CONSTANTS ---
    const canvas = document.getElementById('canvas3d');
    const ctx = canvas.getContext('2d');
    const WIDTH = canvas.width;
    const HEIGHT = canvas.height;
    const CENTER_X = WIDTH / 2;
    const CENTER_Y = HEIGHT / 2;
    const BLOCK_SIZE = 50; 
    const CHUNK_SIZE = 12; // World is 12x12
    const PROJECTION_DISTANCE = 400; 

    // --- GAME STATE ---
    let worldGrid = {}; // { "x,y,z": Cube } for sparse storage
    let angleX = 0; // Pitch (up/down rotation)
    let angleY = 0; // Yaw (left/right rotation)
    let offsetX = 0; // Player World X Offset
    let offsetY = 0; // Player World Y Offset
    let offsetZ = 0; // Player World Z Offset
    let keys = {};
    const MOVE_SPEED = 150; 
    const PLAYER_HEIGHT = 1.5 * BLOCK_SIZE;
    let prevTime = performance.now();

    // Mouse control state
    let isDragging = false;
    let lastMouseX = 0;
    let lastMouseY = 0;
    const ROTATION_SPEED = 0.005;
    
    // Target state
    let targetedBlockKey = null;
    let targetedBlockInfo = null; // Stores target cube and its face direction for placing

    // --- COLOR UTILS ---
    
    /** Simple utility to adjust color brightness (used for shading) */
    function lightenColor(hex, lum) {
        hex = String(hex).replace(/[^0-9a-f]/gi, '');
        if (hex.length < 6) { hex = hex[0] + hex[0] + hex[1] + hex[1] + hex[2] + hex[2]; }
        lum = lum || 0;

        let rgb = "#", c, i;
        for (i = 0; i < 3; i++) {
            c = parseInt(hex.substr(i * 2, 2), 16);
            c = Math.round(Math.min(255, Math.max(0, c + lum)));
            rgb += ("00" + c.toString(16)).substr(c.toString(16).length);
        }
        return rgb;
    }

    // --- BLOCK DEFINITIONS ---
    const BLOCK_TYPES = {
        1: { name: "Grass", color: "#4CAF50", topColor: "#8BC34A", code: 1 },
        2: { name: "Dirt", color: "#795548", code: 2 },
        3: { name: "Stone", color: "#9E9E9E", code: 3 },
        4: { name: "Wood", color: "#5D4037", code: 4 },
        5: { name: "Leaf", color: "#8EAC50", code: 5 },
    };

    // --- GEOMETRY & CUBE CLASS ---

    class Point3D {
        constructor(x, y, z) {
            this.x = x;
            this.y = y;
            this.z = z;
        }
    }

    class Cube {
        constructor(x, y, z, size, typeId) {
            const h = size / 2;
            const type = BLOCK_TYPES[typeId];
            this.id = typeId;
            this.key = `${x},${y},${z}`;
            this.center = new Point3D(x, y, z);
            
            // Vertices are relative to the center (x, y, z)
            this.vertices = [
                new Point3D(x - h, y - h, z - h), // 0: back, bottom, left
                new Point3D(x + h, y - h, z - h), // 1: back, bottom, right
                new Point3D(x + h, y + h, z - h), // 2: back, top, right
                new Point3D(x - h, y + h, z - h), // 3: back, top, left
                new Point3D(x - h, y - h, z + h), // 4: front, bottom, left
                new Point3D(x + h, y - h, z + h), // 5: front, bottom, right
                new Point3D(x + h, y + h, z + h), // 6: front, top, right
                new Point3D(x - h, y + h, z + h)  // 7: front, top, left
            ];
            
            // Define the 6 faces 
            const baseColor = type.color;
            const topColor = type.topColor || baseColor;
            
            this.faces = [
                // Front (+Z)
                { indices: [4, 5, 6, 7], baseColor: lightenColor(baseColor, 10), normal: new Point3D(0, 0, 1) }, 
                // Back (-Z) 
                { indices: [1, 0, 3, 2], baseColor: lightenColor(baseColor, -30), normal: new Point3D(0, 0, -1) }, 
                // Left (-X)
                { indices: [0, 4, 7, 3], baseColor: lightenColor(baseColor, -10), normal: new Point3D(-1, 0, 0) }, 
                // Right (+X)
                { indices: [5, 1, 2, 6], baseColor: lightenColor(baseColor, 10), normal: new Point3D(1, 0, 0) }, 
                // Top (+Y) 
                { indices: [7, 6, 2, 3], baseColor: lightenColor(topColor, 20), normal: new Point3D(0, 1, 0) }, 
                // Bottom (-Y)
                { indices: [4, 5, 1, 0], baseColor: lightenColor(baseColor, -40), normal: new Point3D(0, -1, 0) }  
            ];
        }

        /** Calculates the average Z-depth of a face for Z-sorting. */
        getFaceDepth(face, rotatedVertices) {
            let totalZ = 0;
            for (let i of face.indices) {
                totalZ += rotatedVertices[i].z;
            }
            return totalZ / face.indices.length;
        }
    }

    // --- 3D MATH FUNCTIONS (Translation, Rotation, Projection) ---

    /** Applies player translation and camera rotation to a 3D point. */
    function rotatePoint(p) {
        // 1. Apply Translation (Move the world relative to the camera)
        let x = p.x - offsetX;
        let y = p.y - offsetY - PLAYER_HEIGHT; 
        let z = p.z - offsetZ;

        // 2. Apply Rotation around Y-axis (Yaw)
        let sinY = Math.sin(-angleY);
        let cosY = Math.cos(-angleY);
        let tempX = x * cosY - z * sinY;
        let tempZ = z * cosY + x * sinY;
        x = tempX;
        z = tempZ;

        // 3. Apply Rotation around X-axis (Pitch)
        let sinX = Math.sin(-angleX);
        let cosX = Math.cos(-angleX);
        let tempY = y * cosX - z * sinX;
        tempZ = z * cosX + y * sinX;
        y = tempY;
        z = tempZ;

        return new Point3D(x, y, z);
    }

    /** Projects a 3D point onto the 2D canvas plane. */
    function project3DTo2D(p) {
        const Z_MIN = 0.1;
        const zEffective = Math.max(p.z, Z_MIN); 
        const scale = PROJECTION_DISTANCE / zEffective; 
        
        return {
            x: CENTER_X + p.x * scale,
            y: CENTER_Y - p.y * scale, // Canvas Y is inverted
            z: p.z // Return Z for depth information
        };
    }

    // --- WORLD GENERATION ---
    
    /** Generates a simple tree at a given location */
    function generateTree(x, z, height) {
        const gridX = x * BLOCK_SIZE;
        const gridZ = z * BLOCK_SIZE;
        const groundY = 0; // Assuming ground is at Y=0

        // 1. Trunk (Wood blocks)
        for (let y = 0; y < height; y++) {
            const worldY = groundY + (y * BLOCK_SIZE);
            const cube = new Cube(gridX, worldY, gridZ, BLOCK_SIZE, 4); // 4 = Wood
            worldGrid[cube.key] = cube;
        }

        // 2. Leaves (Leaf blocks)
        const leafCenterY = groundY + height * BLOCK_SIZE;
        const leafRadius = 2; // 2 blocks radius
        const leafHeight = 3; // 3 blocks tall

        for (let dy = -1; dy < leafHeight; dy++) {
            for (let dx = -leafRadius; dx <= leafRadius; dx++) {
                for (let dz = -leafRadius; dz <= leafRadius; dz++) {
                    // Simple spherical/bush shape cutoff
                    if (Math.abs(dx) + Math.abs(dz) + Math.abs(dy) <= 3) { 
                        const worldX = gridX + dx * BLOCK_SIZE;
                        const worldY = leafCenterY + dy * BLOCK_SIZE;
                        const worldZ = gridZ + dz * BLOCK_SIZE;

                        const key = `${worldX},${worldY},${worldZ}`;
                        // Only place leaves if the spot is empty AND not the main trunk
                        if (!worldGrid[key]) {
                            const cube = new Cube(worldX, worldY, worldZ, BLOCK_SIZE, 5); // 5 = Leaf
                            worldGrid[cube.key] = cube;
                        }
                    }
                }
            }
        }
    }


    function initWorld() {
        // Create a basic ground plane of grass and dirt
        for (let x = -CHUNK_SIZE; x <= CHUNK_SIZE; x++) {
            for (let z = -CHUNK_SIZE; z <= CHUNK_SIZE; z++) {
                const worldX = x * BLOCK_SIZE;
                const worldZ = z * BLOCK_SIZE;
                
                // Base layer (Dirt)
                let cube = new Cube(worldX, -BLOCK_SIZE, worldZ, BLOCK_SIZE, 2); // 2 = Dirt
                worldGrid[cube.key] = cube;

                // Top layer (Grass)
                cube = new Cube(worldX, 0, worldZ, BLOCK_SIZE, 1); // 1 = Grass
                worldGrid[cube.key] = cube;
            }
        }
        
        // Add some features
        // Simple Stone Hill
        for (let x = 4; x <= 6; x++) {
            for (let z = -5; z <= -3; z++) {
                const worldX = x * BLOCK_SIZE;
                const worldZ = z * BLOCK_SIZE;
                // Place stone on top of grass/dirt
                const cube = new Cube(worldX, BLOCK_SIZE, worldZ, BLOCK_SIZE, 3); // 3 = Stone
                worldGrid[cube.key] = cube;
            }
        }

        // Add Trees
        generateTree(-8, 5, 4);
        generateTree(10, -5, 3);
        generateTree(2, 7, 5);
        
        // Set player starting position
        offsetX = 0;
        offsetZ = -100;
        offsetY = 0;
    }
    
    // --- RAYCASTING (Center Targeting) ---
    
    /**
     * Finds the block closest to the screen center (the one being targeted).
     * Also determines which face of the block is being looked at.
     * @returns {object | null} { cube: Cube, placeKey: string }
     */
    function findTargetBlock() {
        let closestCube = null;
        let minZ = Infinity;
        let targetFaceNormal = null;
        const MAX_REACH = 800;
        const TARGET_TOLERANCE = 30; // 30 pixels from the center

        for (const key in worldGrid) {
            const cube = worldGrid[key];
            const rotatedCenter = rotatePoint(cube.center);

            if (rotatedCenter.z < 0 || rotatedCenter.z > MAX_REACH) continue; 
            
            const projected = project3DTo2D(rotatedCenter);

            // Calculate distance to screen center
            const distToCenter = Math.sqrt(
                Math.pow(projected.x - CENTER_X, 2) + 
                Math.pow(projected.y - CENTER_Y, 2)
            );
            
            if (distToCenter < TARGET_TOLERANCE) {
                if (rotatedCenter.z < minZ) {
                    minZ = rotatedCenter.z;
                    closestCube = cube;
                }
            }
        }

        if (closestCube) {
            // Determine the placement key (the grid cell adjacent to the targeted block)
            // This is a heavily simplified face-detection approximation
            
            const [x, y, z] = closestCube.key.split(',').map(Number);
            const playerRotated = rotatePoint(new Point3D(offsetX, offsetY, offsetZ));

            // Determine which face the player is most likely looking at by 
            // comparing the player position to the block's position.
            
            let dx = x - offsetX;
            let dy = y - offsetY - PLAYER_HEIGHT;
            let dz = z - offsetZ;
            
            // Find the axis with the greatest magnitude difference
            const absX = Math.abs(dx);
            const absY = Math.abs(dy);
            const absZ = Math.abs(dz);
            
            let newX = x, newY = y, newZ = z;

            if (absX >= absY && absX >= absZ) {
                // Looking at the X face (side)
                newX = x + Math.sign(dx) * BLOCK_SIZE;
                targetFaceNormal = new Point3D(Math.sign(dx), 0, 0);
            } else if (absY >= absX && absY >= absZ) {
                // Looking at the Y face (top/bottom)
                newY = y + Math.sign(dy) * BLOCK_SIZE;
                targetFaceNormal = new Point3D(0, Math.sign(dy), 0);
            } else {
                // Looking at the Z face (front/back)
                newZ = z + Math.sign(dz) * BLOCK_SIZE;
                targetFaceNormal = new Point3D(0, 0, Math.sign(dz));
            }
            
            const placeKey = `${newX},${newY},${newZ}`;

            return { cube: closestCube, placeKey: placeKey, normal: targetFaceNormal };
        }

        return null;
    }

    // --- RENDERING FUNCTIONS ---

    /** Draws a single face on the 2D canvas. */
    function drawFace(vertices2D, color, isTargeted) {
        if (vertices2D.length < 3) return;

        ctx.beginPath();
        ctx.moveTo(vertices2D[0].x, vertices2D[0].y);
        
        for (let i = 1; i < vertices2D.length; i++) {
            ctx.lineTo(vertices2D[i].x, vertices2D[i].y);
        }

        ctx.closePath();
        
        ctx.fillStyle = color;
        ctx.fill();
        
        // Outline and highlight for the target block
        ctx.strokeStyle = isTargeted ? '#FFD700' : '#000000'; // Gold highlight
        ctx.lineWidth = isTargeted ? 3 : 1;
        ctx.stroke();
    }
    
    /** Renders a single cube. */
    function drawCube(cube, isTargeted) {
        const rotatedVertices = cube.vertices.map(rotatePoint);

        // Simple culling: if all vertices are behind the camera (z < 0), skip drawing
        if (rotatedVertices.every(v => v.z < 0)) return;

        const projectedVertices = rotatedVertices.map(project3DTo2D);

        // Prepare faces for drawing (Z-sort)
        const sortedFaces = cube.faces
            .map(face => ({
                face: face,
                // Use the average Z of the face for depth sorting
                depth: cube.getFaceDepth(face, rotatedVertices) 
            }))
            .sort((a, b) => b.depth - a.depth); // Sort back to front (Painter's Algorithm)

        // Draw faces
        for (const { face } of sortedFaces) {
            const face2D = face.indices.map(i => projectedVertices[i]);
            drawFace(face2D, face.baseColor, isTargeted);
        }
    }


    function updateAndDraw() {
        // Calculate delta time
        const now = performance.now();
        const delta = (now - prevTime) / 1000;
        prevTime = now;

        updateMovement(delta);
        
        ctx.clearRect(0, 0, WIDTH, HEIGHT);
        // Draw sky
        ctx.fillStyle = '#66AABB'; 
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        
        // Find the block the player is looking at
        targetedBlockInfo = findTargetBlock();
        targetedBlockKey = targetedBlockInfo ? targetedBlockInfo.cube.key : null;
        
        // Get all cubes, sort them by depth
        const allCubes = Object.values(worldGrid);
        
        // Sort cubes by their center Z position after rotation
        allCubes.sort((a, b) => {
            const centerA = rotatePoint(a.center);
            const centerB = rotatePoint(b.center);
            // Sort by largest Z first (farthest blocks first)
            return centerB.z - centerA.z;
        });

        // Draw the sorted cubes
        allCubes.forEach(cube => {
            const isTargeted = cube.key === targetedBlockKey;
            drawCube(cube, isTargeted);
        });
        
        requestAnimationFrame(updateAndDraw);
    }

    // --- GAME LOGIC (Movement and Interaction) ---

    function updateMovement(delta) {
        if (!Object.values(keys).some(v => v)) return;

        let dx = 0;
        let dz = 0;
        const moveStep = MOVE_SPEED * delta;
        
        // Calculate raw movement based on keys
        if (keys['w']) dz -= moveStep;
        if (keys['s']) dz += moveStep;
        if (keys['a']) dx -= moveStep;
        if (keys['d']) dx += moveStep;
        
        // Apply rotation to raw movement for first-person control
        const sinY = Math.sin(angleY);
        const cosY = Math.cos(angleY);

        offsetX += dx * cosY - dz * sinY;
        offsetZ += dz * cosY + dx * sinY;

        // Simple Ground Lock (Prevents falling/jumping for minimal capability)
        offsetY = 0; 
    }

    function destroyBlock() {
        if (targetedBlockKey) {
            delete worldGrid[targetedBlockKey];
            targetedBlockKey = null;
            targetedBlockInfo = null;
        }
    }

    function placeBlock(typeId) {
        if (targetedBlockInfo && targetedBlockInfo.placeKey) {
            const placeKey = targetedBlockInfo.placeKey;
            
            // Prevent placing a block if the target spot is already occupied
            if (!worldGrid[placeKey]) {
                const [x, y, z] = placeKey.split(',').map(Number);
                const newCube = new Cube(x, y, z, BLOCK_SIZE, typeId);
                worldGrid[placeKey] = newCube;
            }
        }
    }

    // --- INPUT HANDLERS ---

    function handleMouseDown(event) {
        // Prevent context menu on right click
        if (event.button === 2) event.preventDefault();

        // LMB (Button 0) = Destroy Block (Cut Tree, Mine Stone, etc.)
        if (event.button === 0) {
            isDragging = true;
            lastMouseX = event.clientX;
            lastMouseY = event.clientY;
            destroyBlock();
        } 
        // RMB (Button 2) = Place Block (Using Stone type for now)
        else if (event.button === 2) {
            placeBlock(3); // 3 = Stone Block
        }
    }

    function handleMouseUp() {
        isDragging = false;
    }

    function handleMouseMove(event) {
        if (!isDragging) return;

        const deltaX = event.clientX - lastMouseX;
        const deltaY = event.clientY - lastMouseY;

        // Yaw (Y-axis rotation)
        angleY += deltaX * ROTATION_SPEED;
        
        // Pitch (X-axis rotation)
        angleX += deltaY * ROTATION_SPEED;
        // Clamp pitch (cannot look straight up or down past 90 degrees)
        angleX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, angleX));

        lastMouseX = event.clientX;
        lastMouseY = event.clientY;
    }

    function onKeyDown(event) {
        const key = event.key.toLowerCase();
        if (['w', 'a', 's', 'd'].includes(key)) {
            keys[key] = true;
            event.preventDefault();
        }
    }

    function onKeyUp(event) {
        const key = event.key.toLowerCase();
        if (['w', 'a', 's', 'd'].includes(key)) {
            keys[key] = false;
        }
    }

    // --- STARTUP ---
    window.onload = function() {
        initWorld();
        
        canvas.addEventListener('mousedown', handleMouseDown);
        document.addEventListener('mouseup', handleMouseUp);
        document.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);
        
        // Disable context menu on canvas for RMB use
        canvas.addEventListener('contextmenu', e => e.preventDefault());
        
        // Start the manual 3D engine loop
        requestAnimationFrame(updateAndDraw);
    }
</script>
